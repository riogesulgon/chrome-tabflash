<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="hint">Type the highlighted key(s) to jump &middot; Esc to close</div>
    <div id="toolbar">
      <button id="merge-btn" title="Merge all windows (Shift+M)">Merge all windows</button>
      <button id="sort-btn" title="Toggle alphabetical sort (Shift+S)">Sort: Tab order</button>
      <button id="new-window-btn" title="Open selected tab in new window (Shift+N)">Open in new window</button>
    </div>
    <div id="list"></div>
    <div id="empty" hidden>No tabs found.</div>
    <script src="popup.js"></script>
  </body>
</html>
